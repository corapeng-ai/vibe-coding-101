<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pre-Talks Roller — Vibe Coding 101 | Lunatechs Singapore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #060913;
    color: #fff;
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
  }

  /* --- Layout: main content + sidebar --- */
  #main {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: radial-gradient(circle at 50% 30%, #0d1a30 0%, #040711 100%);
  }

  #sidebar {
    width: 30vw;
    min-width: 340px;
    max-width: 500px;
    border-left: 1px solid rgba(56, 189, 248, 0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 5vh 2.5vw;
    z-index: 100;
    animation: sidebarColorShift 60s ease-in-out infinite;
    box-shadow: -10px 0 40px rgba(0,0,0,0.6);
  }

  @keyframes sidebarColorShift {
    0%   { background: linear-gradient(180deg, #0a1628 0%, #0d1f3c 100%); }
    25%  { background: linear-gradient(180deg, #0c1830 0%, #0a1a35 100%); }
    50%  { background: linear-gradient(180deg, #08142a 0%, #0f2040 100%); }
    75%  { background: linear-gradient(180deg, #0b1525 0%, #0c1d38 100%); }
    100% { background: linear-gradient(180deg, #0a1628 0%, #0d1f3c 100%); }
  }

  .sidebar-brand {
    text-align: center;
    animation: brandPulse 12s ease-in-out infinite, sidebarFloat 10s ease-in-out infinite -2s;
  }

  @keyframes brandPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.85; }
  }

  .sidebar-brand-text {
    font-size: clamp(24px, 2.2vw, 36px);
    font-weight: 800;
    letter-spacing: 1.5px;
    line-height: 1.2;
  }

  .sidebar-brand-text .luna { color: #ffffff; }
  .sidebar-brand-text .techs { color: #38bdf8; }
  .sidebar-brand-text .location { color: #ffc857; font-weight: 600; display: block; font-size: 0.65em; letter-spacing: 3px; margin-top: 2px; }

  .sidebar-brand-tagline {
    color: #38bdf8;
    font-size: clamp(11px, 0.85vw, 15px);
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 8px;
    text-align: center;
  }

  .sidebar-qr {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5vh;
    animation: sidebarFloat 8s ease-in-out infinite;
  }

  @keyframes sidebarFloat {
    0%, 100% { transform: translateY(0) translateX(0); }
    25% { transform: translateY(-5px) translateX(2px); }
    50% { transform: translateY(-3px) translateX(-2px); }
    75% { transform: translateY(-6px) translateX(1px); }
  }

  .sidebar-qr img {
    width: 17vw;
    height: 17vw;
    min-width: 190px;
    min-height: 190px;
    max-width: 290px;
    max-height: 290px;
    border-radius: 16px;
    background: #fff;
    padding: 10px;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 25px rgba(56, 189, 248, 0.25);
  }

  .sidebar-qr .qr-label {
    font-size: clamp(12px, 0.9vw, 16px);
    color: #6aa8e8;
    font-weight: 600;
    letter-spacing: 1px;
    text-align: center;
  }

  .sidebar-links {
    text-align: center;
    color: #b0b8c8;
    font-size: clamp(11px, 0.85vw, 15px);
    line-height: 1.6;
    max-width: 90%;
  }

  .sidebar-links .links-intro {
    color: #ffc857;
    font-size: clamp(10px, 0.75vw, 13px);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 0.6vh;
    font-weight: 600;
  }

  .sidebar-links .links-list {
    color: #fff;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .deck-link-btn {
    margin-top: 1.5vh;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 24px;
    background: linear-gradient(135deg, rgba(56, 189, 248, 0.2) 0%, rgba(56, 189, 248, 0.08) 100%);
    border: 1px solid rgba(56, 189, 248, 0.4);
    border-radius: 30px;
    color: #ffffff;
    text-decoration: none;
    font-size: clamp(12px, 0.85vw, 15px);
    font-weight: 600;
    transition: all 0.25s ease;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  .deck-link-btn:hover {
    background: linear-gradient(135deg, rgba(56, 189, 248, 0.4) 0%, rgba(56, 189, 248, 0.2) 100%);
    border-color: #38bdf8;
    color: #ffffff;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4);
  }

  /* --- Slide container --- */
  #slides {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity var(--transition-duration, 800ms) ease-in-out, visibility 800ms step-end;
    pointer-events: none;
  }

  .slide.active {
    opacity: 1;
    visibility: visible;
    transition: opacity var(--transition-duration, 800ms) ease-in-out, visibility 0ms step-start;
    pointer-events: auto;
  }

  /* --- Image slides --- */
  .slide-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 2vw;
  }

  .slide-caption {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(14px, 1.3vw, 22px);
    color: #38bdf8;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
    background: rgba(6, 9, 19, 0.85);
    padding: 8px 24px;
    border-radius: 20px;
    border: 1px solid rgba(56, 189, 248, 0.3);
  }

  /* --- About slide --- */
  .about-slide {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3vh;
    text-align: center;
    padding: 4vh 4vw;
    width: 100%;
    height: 100%;
  }

  .about-title {
    font-size: clamp(32px, 4vw, 56px);
    font-weight: 800;
    background: linear-gradient(135deg, #ffffff 0%, #38bdf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .about-tagline {
    font-size: clamp(18px, 1.8vw, 28px);
    color: #ffc857;
    font-weight: 600;
  }

  .about-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5vw;
    max-width: 60vw;
    margin-top: 2vh;
  }

  .about-card {
    background: rgba(56, 189, 248, 0.06);
    border: 1px solid rgba(56, 189, 248, 0.2);
    border-radius: 16px;
    padding: 2.5vh 1.5vw;
    text-align: center;
  }

  .about-card-label {
    font-size: clamp(11px, 0.9vw, 14px);
    color: #38bdf8;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .about-card-val {
    font-size: clamp(14px, 1.3vw, 20px);
    color: #ffffff;
    font-weight: 500;
    line-height: 1.5;
  }

  /* --- Roles slide --- */
  .roles-slide {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3vh;
    text-align: center;
    padding: 5vh 4vw;
    width: 100%;
    height: 100%;
  }

  .roles-title {
    font-size: clamp(34px, 4.5vw, 60px);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #ffffff 0%, #38bdf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .roles-subtitle {
    font-size: clamp(16px, 1.5vw, 24px);
    color: #38bdf8;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .roles-list {
    display: flex;
    flex-wrap: wrap;
    gap: 1.2vw;
    justify-content: center;
    max-width: 60vw;
  }

  .role-pill {
    background: rgba(56, 189, 248, 0.12);
    border: 1px solid rgba(56, 189, 248, 0.3);
    color: #a0d8ff;
    padding: 1.2vh 2vw;
    border-radius: 50px;
    font-size: clamp(14px, 1.3vw, 20px);
    font-weight: 500;
    white-space: nowrap;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .roles-contact {
    font-size: clamp(14px, 1.2vw, 18px);
    color: #ffc857;
    margin-top: 1vh;
    letter-spacing: 1px;
    font-weight: 600;
  }

  /* --- Chapters slide --- */
  .chapters-slide {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2vh;
    text-align: center;
    padding: 3vh 2vw;
    width: 100%;
    height: 100%;
  }

  .chapters-title {
    font-size: clamp(32px, 4.2vw, 56px);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #ffffff 0%, #ffc857 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .chapters-subtitle {
    font-size: clamp(14px, 1.3vw, 22px);
    color: #ffc857;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .chapters-note {
    font-size: clamp(13px, 1.1vw, 18px);
    color: #ffb432;
    font-style: italic;
    margin-top: 1vh;
    text-align: center;
    max-width: 65vw;
    line-height: 1.5;
  }

  .chapters-note strong {
    color: #fff;
    font-style: normal;
    font-weight: 700;
  }

  .world-map-container {
    position: relative;
    width: 100%;
    flex: 1;
    max-height: 52vh;
  }

  .world-map-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    opacity: 0.85;
  }

  .chapter-marker {
    position: absolute;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .chapter-marker.label-above {
    transform: translate(-50%, -100%);
  }

  .chapter-marker.label-above .marker-label {
    margin-bottom: 0.6vh;
  }

  .marker-dot {
    width: 1.8vw;
    height: 1.8vw;
    min-width: 16px;
    min-height: 16px;
    border-radius: 50%;
    margin: 0 auto 0.4vh;
    position: relative;
  }

  .marker-dot.active {
    background: #FFD700;
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.9), 0 0 50px rgba(255, 215, 0, 0.5);
    animation: pulse 2s ease-in-out infinite;
  }

  .marker-dot.active::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid rgba(255, 215, 0, 0.5);
    animation: ripple 2s ease-out infinite;
  }

  .marker-dot.coming-soon {
    background: #ffb432;
    box-shadow: 0 0 20px rgba(255, 180, 50, 0.6);
    animation: pulse 2s ease-in-out infinite 0.5s;
  }

  .marker-dot.coming-soon::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid rgba(255, 180, 50, 0.4);
    animation: ripple 2s ease-out infinite 0.5s;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.8; }
  }

  @keyframes ripple {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  .marker-label {
    font-size: clamp(12px, 1.3vw, 18px);
    font-weight: 700;
    white-space: nowrap;
    color: #fff;
    text-shadow: 0 0 15px rgba(0,0,0,0.9);
  }

  .marker-status {
    font-size: clamp(10px, 0.85vw, 13px);
    color: #ffb432;
    font-style: italic;
  }

  /* --- Manifesto slide --- */
  .manifesto-slide {
    display: flex;
    flex-direction: column;
    text-align: center;
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
  }

  .manifesto-scroll-mask {
    position: absolute;
    inset: 0;
    overflow: hidden;
    -webkit-mask-image: linear-gradient(
      to bottom,
      transparent 0%,
      black 15%,
      black 60%,
      transparent 85%
    );
    mask-image: linear-gradient(
      to bottom,
      transparent 0%,
      black 15%,
      black 60%,
      transparent 85%
    );
  }

  .manifesto-scroll-track {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5vh;
    padding: 0 8vw;
    will-change: transform;
  }

  .slide.active .manifesto-scroll-track {
    animation: manifestoScroll var(--manifesto-duration, 30s) linear forwards;
  }

  @keyframes manifestoScroll {
    0% { transform: translateY(85vh); }
    100% { transform: translateY(-100%); }
  }

  .manifesto-title {
    font-size: clamp(28px, 3.5vw, 48px);
    font-weight: 700;
    font-style: italic;
    color: #fff;
    padding-bottom: 3vh;
    letter-spacing: 2px;
    animation: titleBreathe 6s ease-in-out infinite;
  }

  @keyframes titleBreathe {
    0%, 100% { letter-spacing: 2px; transform: scale(1); }
    50% { letter-spacing: 4px; transform: scale(1.02); }
  }

  .manifesto-line {
    font-size: clamp(16px, 1.6vw, 24px);
    line-height: 1.6;
    color: #b0b8c8;
  }

  .manifesto-line.emphasis {
    color: #fff;
    font-weight: 600;
    font-style: italic;
    font-size: clamp(20px, 2.1vw, 32px);
  }

  .manifesto-line.brand {
    font-size: clamp(28px, 3.2vw, 46px);
    font-weight: 800;
    color: #38bdf8;
    letter-spacing: 3px;
    padding-top: 2vh;
  }

  .manifesto-line.cta {
    font-size: clamp(18px, 1.8vw, 26px);
    font-weight: 600;
    color: #ffc857;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .manifesto-line.spacer { height: 3vh; }

  .manifesto-ending {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    opacity: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2vh;
  }

  .slide.active .manifesto-ending {
    animation: manifestoEndingFade 2s ease-out forwards;
    animation-delay: var(--ending-delay, 25s);
  }

  @keyframes manifestoEndingFade {
    from { opacity: 0; transform: translate(-50%, -45%); }
    to { opacity: 1; transform: translate(-50%, -50%); }
  }

  .manifesto-ending .brand-logo {
    width: 70vw;
    max-width: 900px;
    height: auto;
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  }

  .manifesto-ending .cta {
    font-size: clamp(18px, 1.6vw, 24px);
    font-weight: 700;
    color: #38bdf8;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 1vh;
  }

  /* --- Upcoming events slide --- */
  .upcoming-slide {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3vh;
    text-align: center;
    padding: 5vh 4vw;
    width: 100%;
    height: 100%;
  }

  .upcoming-title {
    font-size: clamp(32px, 4vw, 56px);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #ffffff 0%, #38bdf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .upcoming-list {
    display: flex;
    flex-direction: column;
    gap: 1.8vh;
    width: 100%;
    max-width: 55vw;
  }

  .upcoming-event {
    background: rgba(56, 189, 248, 0.06);
    border: 1px solid rgba(56, 189, 248, 0.2);
    border-radius: 14px;
    padding: 1.8vh 2vw;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 1.5vw;
  }

  .upcoming-event .event-status {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .upcoming-event .event-status.active {
    background: #38bdf8;
    box-shadow: 0 0 10px rgba(56, 189, 248, 0.8);
  }

  .upcoming-event .event-status.coming-soon {
    background: #ffb432;
    box-shadow: 0 0 10px rgba(255, 180, 50, 0.6);
  }

  .upcoming-event .event-name {
    font-size: clamp(15px, 1.4vw, 22px);
    font-weight: 600;
    color: #fff;
  }

  .upcoming-event .event-date {
    font-size: clamp(12px, 1.1vw, 16px);
    color: #38bdf8;
    margin-top: 0.3vh;
  }

  .upcoming-event .event-detail {
    font-size: clamp(11px, 0.95vw, 14px);
    color: #888;
    margin-top: 0.2vh;
  }

  .upcoming-event .event-coming-soon {
    font-size: clamp(11px, 0.95vw, 14px);
    color: #ffb432;
    font-style: italic;
    margin-top: 0.3vh;
  }

  .upcoming-footer {
    font-size: clamp(13px, 1.2vw, 18px);
    color: #6aa8e8;
    letter-spacing: 2px;
    margin-top: 1vh;
  }

  /* --- Partners slide --- */
  .partners-slide {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3vh;
    text-align: center;
    padding: 5vh 4vw;
    width: 100%;
    height: 100%;
  }

  .partners-title {
    font-size: clamp(32px, 4vw, 56px);
    font-weight: 800;
    background: linear-gradient(135deg, #ffffff 0%, #ffc857 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .partners-card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    padding: 3vh 4vw;
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: 50vw;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .partners-card img {
    max-width: 100%;
    max-height: 25vh;
    object-fit: contain;
  }

  /* --- Controls & Progress --- */
  #mute-btn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    z-index: 102;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }

  #mute-btn:hover {
    background: rgba(255, 255, 255, 0.25);
  }

  #mute-btn svg {
    width: 20px;
    height: 20px;
    fill: #ffffff;
  }

  #progress {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 32px;
    height: 32px;
    z-index: 101;
  }

  #progress svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  #progress circle {
    fill: none;
    stroke-width: 2.5;
  }

  #progress .progress-bg {
    stroke: rgba(255, 255, 255, 0.15);
  }

  #progress .progress-fill {
    stroke: #38bdf8;
    stroke-dasharray: 62.83;
    stroke-dashoffset: 62.83;
    stroke-linecap: round;
    transition: none;
  }

  #progress .progress-fill.animate {
    transition: stroke-dashoffset linear;
  }
</style>
</head>
<body>

<audio id="bgm" loop preload="auto"></audio>

<div id="main">
  <div id="slides"></div>
  <div id="mute-btn" title="Toggle audio">
    <svg id="icon-unmuted" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    <svg id="icon-muted" style="display:none" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
  </div>
  <div id="progress">
    <svg viewBox="0 0 24 24"><circle class="progress-bg" cx="12" cy="12" r="10"/><circle class="progress-fill" cx="12" cy="12" r="10"/></svg>
  </div>
</div>

<div id="sidebar"></div>

<script>
(async function() {
  const defaultMasterConfig = {
    event: {
      name: "Vibe Coding 101: Your First AI Build Starts Here",
      subtitle: "Lunatechs Singapore X SMU AI"
    },
    frame: {
      link: {
        image: "https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https%3A%2F%2Fchat.whatsapp.com%2FKoThLSBd2p93Z2kh2kXjkL%3Fs%3Dcl%26p%3Di%26ilr%3D4",
        label: "Lunatechs SG WhatsApp",
        channels: ["WhatsApp", "Instagram", "YouTube", "LinkedIn", "Email", "Web"]
      }
    },
    defaultDuration: 7000,
    transitionDuration: 800,
    slides: [
      {
        type: "image",
        src: "../images/vibe-coding-banner.jpg",
        fit: "contain",
        caption: "Vibe Coding 101 — Building Your First AI App"
      },
      {
        type: "manifesto",
        duration: 32000,
        title: "Here's to the lunatics...",
        lines: [
          "The ones who genuinely love technology.",
          "Not just for the gadgets — but for what it can do.",
          "",
          "The ones who get a little too excited about what's next.",
          "Who believe the future isn't something you wait for…",
          "it's something you build.",
          "",
          "The ones who believe you don't need to be a genius or rich to make a difference…",
          "Just curious.",
          "Just hopeful.",
          "Just willing to get to work.",
          "",
          "Because the people crazy enough to think technology can change the world for the better…",
          "",
          "are the ones who do."
        ]
      },
      {
        type: "about",
        duration: 8000,
        title: "Who is Lunatechs?",
        tagline: "Your tribe of Technology Lunatics.",
        cards: [
          { label: "Charter", val: "Build. Learn. Share. Connect." },
          { label: "Mission", val: "Change the world." },
          { label: "Events", val: "Hikes, Meetups, Hackathons, Excursions" }
        ]
      },
      {
        type: "roles",
        duration: 7000,
        title: "Join Us!",
        subtitle: "Help build the Lunatechs community",
        roles: [
          "Event Organizer",
          "Community Outreach",
          "Event Volunteer",
          "Social Media Manager",
          "Web Developer"
        ],
        contact: "info@lunatechs.social"
      },
      {
        type: "chapters",
        duration: 9000,
        title: "Start a New Chapter",
        subtitle: "Bring Lunatechs to your city",
        chapters: [
          { name: "Singapore", status: "active", lat: 1.35, lng: 103.82 },
          { name: "Hong Kong", status: "active", lat: 22.3, "lng": 114.2 },
          { name: "Silicon Valley", status: "coming-soon", lat: 37.4, lng: -122.0, labelAbove: true },
          { name: "Los Angeles", status: "coming-soon", lat: 34.05, lng: -118.24 }
        ],
        note: "Actively looking for leaders in <strong>Shanghai</strong> · <strong>Shenzhen</strong> · <strong>Tokyo</strong> · <strong>Taipei</strong>"
      },
      {
        type: "partners",
        duration: 7000,
        title: "Thank You to Our Partners",
        image: "../images/partners.png"
      }
    ]
  };

  let config = defaultMasterConfig;
  try {
    const res = await fetch('config.json');
    if (res.ok) {
      const externalConfig = await res.json();
      if (externalConfig && externalConfig.slides && externalConfig.slides.length > 0) {
        config = externalConfig;
      }
    }
  } catch (err) {}

  const transitionMs = config.transitionDuration || 800;
  document.documentElement.style.setProperty('--transition-duration', transitionMs + 'ms');

  buildSidebar(config.frame);

  const container = document.getElementById('slides');
  const slideEls = [];

  for (const slide of config.slides) {
    const el = document.createElement('div');
    el.className = 'slide';
    el.innerHTML = renderSlide(slide);
    if (slide.background) el.style.background = slide.background;
    container.appendChild(el);
    slideEls.push(el);
  }

  let current = 0;
  let timerId = null;
  const progressFill = document.querySelector('#progress .progress-fill');
  const circumference = 2 * Math.PI * 10;

  function show(index) {
    if (timerId) clearTimeout(timerId);

    slideEls.forEach((el, idx) => {
      if (idx === index) {
        el.classList.add('active');
      } else {
        el.classList.remove('active');
      }
    });

    const duration = config.slides[index].duration || config.defaultDuration || 7000;

    progressFill.classList.remove('animate');
    progressFill.style.strokeDashoffset = circumference;
    void progressFill.getBoundingClientRect();
    progressFill.classList.add('animate');
    progressFill.style.transitionDuration = duration + 'ms';
    progressFill.style.strokeDashoffset = '0';

    timerId = setTimeout(() => {
      current = (current + 1) % slideEls.length;
      show(current);
    }, duration + transitionMs);
  }

  show(0);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      current = (current + 1) % slideEls.length;
      show(current);
    } else if (e.key === 'ArrowLeft') {
      current = (current - 1 + slideEls.length) % slideEls.length;
      show(current);
    } else if (e.key === 'Escape' || e.key === 'r' || e.key === 'R') {
      window.location.href = '../index.html';
    }
  });

  const bgm = document.getElementById('bgm');
  const muteBtn = document.getElementById('mute-btn');
  const iconUnmuted = document.getElementById('icon-unmuted');
  const iconMuted = document.getElementById('icon-muted');
  let muted = false;

  bgm.volume = 0.35;

  function startAudio() {
    bgm.play().catch(() => {});
    document.removeEventListener('click', startAudio);
  }
  document.addEventListener('click', startAudio);
  bgm.play().catch(() => {});

  muteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    muted = !muted;
    bgm.muted = muted;
    iconUnmuted.style.display = muted ? 'none' : 'block';
    iconMuted.style.display = muted ? 'block' : 'none';
  });

  function buildSidebar(frame) {
    const sidebar = document.getElementById('sidebar');
    const link = frame.link || frame.linktree || {};
    const linksList = (link && link.channels)
      ? link.channels.join(' · ')
      : 'WhatsApp · Instagram · YouTube · LinkedIn · Email · Web';

    sidebar.innerHTML = `
      <div class="sidebar-brand">
        <div class="sidebar-brand-text"><span class="luna">luna</span><span class="techs">techs</span> <span class="location">Singapore</span></div>
        <div class="sidebar-brand-tagline">Change the World!</div>
      </div>
      <div class="sidebar-qr">
        <img src="${link.image || 'https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https%3A%2F%2Fchat.whatsapp.com%2FKoThLSBd2p93Z2kh2kXjkL%3Fs%3Dcl%26p%3Di%26ilr%3D4'}" alt="${link.label || 'Lunatechs SG WhatsApp'}">
        ${link.label ? `<div class="qr-label">${link.label}</div>` : ''}
      </div>
      <div class="sidebar-links">
        <div class="links-intro">All our links are here</div>
        <div class="links-list">${linksList}</div>
        <a href="../index.html" class="deck-link-btn">
          <span>Start Presentation Deck →</span>
        </a>
      </div>
    `;
  }

  function renderSlide(slide) {
    switch (slide.type) {
      case 'image': return renderImage(slide);
      case 'about': return renderAbout(slide);
      case 'roles': return renderRoles(slide);
      case 'chapters': return renderChapters(slide);
      case 'manifesto': return renderManifesto(slide);
      case 'upcoming': return renderUpcoming(slide);
      case 'partners': return renderPartners(slide);
      default: return `<p>Unknown slide type: ${slide.type}</p>`;
    }
  }

  function renderImage(slide) {
    const caption = slide.caption ? `<div class="slide-caption">${slide.caption}</div>` : '';
    return `<img class="slide-image" src="${slide.src}" style="object-fit:${slide.fit || 'contain'}">${caption}`;
  }

  function renderAbout(slide) {
    const cards = slide.cards.map(c => `
      <div class="about-card">
        <div class="about-card-label">${c.label}</div>
        <div class="about-card-val">${c.val}</div>
      </div>
    `).join('');

    return `
      <div class="about-slide">
        <div class="about-title">${slide.title}</div>
        <div class="about-tagline">${slide.tagline || ''}</div>
        <div class="about-cards">${cards}</div>
      </div>`;
  }

  function renderRoles(slide) {
    const pills = slide.roles.map(r => `<div class="role-pill">${r}</div>`).join('');
    const contact = slide.contact ? `<div class="roles-contact">${slide.contact}</div>` : '';
    return `
      <div class="roles-slide">
        <div class="roles-title">${slide.title}</div>
        <div class="roles-subtitle">${slide.subtitle || ''}</div>
        <div class="roles-list">${pills}</div>
        ${contact}
      </div>`;
  }

  function renderManifesto(slide) {
    const duration = (slide.duration || config.defaultDuration || 7000) / 1000;
    const lines = slide.lines.map(line => {
      if (line === '') return '<div class="manifesto-line spacer"></div>';
      let cls = 'manifesto-line';
      if (line.startsWith('are the ones')) cls += ' emphasis';
      else if (line === 'Lunatechs') cls += ' brand';
      else if (line.startsWith("Let's Change")) cls += ' cta';
      return `<div class="${cls}">${line}</div>`;
    }).join('');
    const endingDelay = duration * 0.85;
    return `
      <div class="manifesto-slide" style="--manifesto-duration:${duration}s; --ending-delay:${endingDelay.toFixed(1)}s">
        <div class="manifesto-scroll-mask">
          <div class="manifesto-scroll-track">
            <div class="manifesto-title">${slide.title}</div>
            ${lines}
          </div>
        </div>
        <div class="manifesto-ending">
          <img class="brand-logo" src="../images/lunatechs-banner.jpg" alt="Lunatechs">
          <div class="cta">Let's Change the World!</div>
        </div>
      </div>`;
  }

  function renderUpcoming(slide) {
    const events = slide.events.map(ev => {
      const dateHtml = ev.date ? `<div class="event-date">${ev.date}</div>` : '';
      const detailHtml = ev.detail ? `<div class="event-detail">${ev.detail}</div>` : '';
      const comingSoon = ev.status === 'coming-soon' ? `<div class="event-coming-soon">Coming Soon!</div>` : '';
      return `
        <div class="upcoming-event">
          <div class="event-status ${ev.status}"></div>
          <div>
            <div class="event-name">${ev.name}</div>
            ${dateHtml}
            ${detailHtml}
            ${comingSoon}
          </div>
        </div>`;
    }).join('');
    const footer = slide.footer ? `<div class="upcoming-footer">${slide.footer}</div>` : '';
    return `
      <div class="upcoming-slide">
        <div class="upcoming-title">${slide.title}</div>
        <div class="upcoming-list">${events}</div>
        ${footer}
      </div>`;
  }

  function renderChapters(slide) {
    const mapImg = `<img src="../images/world-map.svg" alt="World Map">`;

    const markers = slide.chapters.map(ch => {
      const x = ((ch.lng + 180) / 360) * 100;
      const y = ((90 - ch.lat) / 180) * 100;
      const dotClass = ch.status === 'active' ? 'active' : 'coming-soon';
      const statusLabel = ch.status === 'coming-soon' ? '<div class="marker-status">coming soon!</div>' : '';
      const labelBlock = `<div class="marker-label">${ch.name}</div>${statusLabel}`;
      const inner = ch.labelAbove
        ? `${labelBlock}\n          <div class="marker-dot ${dotClass}"></div>`
        : `<div class="marker-dot ${dotClass}"></div>${labelBlock}`;
      const aboveClass = ch.labelAbove ? ' label-above' : '';
      return `
        <div class="chapter-marker${aboveClass}" style="left:${x.toFixed(2)}%;top:${y.toFixed(2)}%;">
          ${inner}
        </div>`;
    }).join('');

    const note = slide.note ? `<div class="chapters-note">${slide.note}</div>` : '';

    return `
      <div class="chapters-slide">
        <div class="chapters-title">${slide.title}</div>
        <div class="chapters-subtitle">${slide.subtitle || ''}</div>
        <div class="world-map-container">
          ${mapImg}
          ${markers}
        </div>
        ${note}
      </div>`;
  }

  function renderPartners(slide) {
    return `
      <div class="partners-slide">
        <div class="partners-title">${slide.title}</div>
        <div class="partners-card">
          <img src="${slide.image}" alt="Partners">
        </div>
      </div>`;
  }
})();
</script>
</body>
</html>
